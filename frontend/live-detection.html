<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Detection - DEEPFAKE DETECTOR</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            black: '#0a0a0a',
            cyan: '#00ffff',
            darkgray: '#1a1a1a'
          },
          fontFamily: {
            mono: ['"Courier New"', 'Courier', 'monospace'],
          }
        }
      }
    }
  </script>
  <!-- Face API JS -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #050505;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
    }

    .video-container {
      position: relative;
      width: 640px;
      height: 480px;
      background: #000;
      border: 2px solid #333;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(0, 255, 255, 0.8);
      box-shadow: 0 0 15px #00ffff;
      animation: scan 2s linear infinite;
      z-index: 10;
    }

    @keyframes scan {
      0% {
        top: 0%;
      }

      50% {
        top: 100%;
      }

      100% {
        top: 0%;
      }
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center relative overflow-y-auto bg-black">

  <!-- Grid Background -->
  <div class="absolute inset-0 z-0 opacity-20 pointer-events-none"
    style="background-image: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px); background-size: 40px 40px;">
  </div>

  <!-- Header -->
  <div class="absolute top-0 left-0 w-full p-6 z-20 flex justify-between items-center pointer-events-none">
    <div class="flex items-center space-x-2 pointer-events-auto">
      <a href="vastav.html" class="text-cyan hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11 15l-3-3m0 0l3-3m-3 3h8M3 12a9 9 0 1118 0 9 9 0 01-18 0z" />
        </svg>
      </a>
      <h1 class="text-2xl font-bold tracking-widest text-white">LIVENESS_CHECK</h1>
    </div>
    <div id="status-badge"
      class="px-4 py-1 bg-gray-800 text-gray-400 rounded-full text-xs font-mono border border-gray-600 pointer-events-auto">
      waiting_for_input...</div>
  </div>

  <!-- Main Live Feed -->
  <div class="relative z-10 flex flex-col items-center w-full max-w-4xl mx-auto px-4">

    <!-- Mode Toggles -->
    <div class="flex space-x-4 mb-6 justify-center w-full relative z-50">
      <button id="mode-webcam"
        class="tab-btn active border border-cyan bg-cyan/10 text-cyan px-4 py-2 rounded text-xs font-bold hover:bg-cyan/20 transition-all flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
        WEBCAM_LIVENESS
      </button>
      <button id="mode-screen"
        class="tab-btn border border-gray-700 text-gray-400 px-4 py-2 rounded text-xs font-bold hover:border-cyan hover:text-cyan transition-all flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        ANALYZE_SCREEN_VIDEO
      </button>
    </div>

    <div class="video-container rounded-lg shadow-[0_0_50px_rgba(0,0,0,0.8)] mb-6 relative overflow-hidden">
      <video id="video" autoplay muted></video>
      <div class="scan-line hidden" id="scan-line"></div>
    </div>

    <div id="instruction-panel" class="text-center space-y-2">
      <h2 class="text-xl text-white font-bold">BIOMETRIC AUTHENTICATION</h2>
      <p id="instruction-text" class="text-cyan text-sm animate-pulse">Position your face within the frame</p>
    </div>

    <button id="start-btn"
      class="mt-8 px-8 py-3 bg-cyan text-black font-bold text-lg rounded hover:bg-white transition-all shadow-[0_0_20px_rgba(0,255,255,0.4)]">
      INITIATE SCAN
    </button>

  </div>

  <script src="live.js"></script>
</body>

</html>
