<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Deepfake Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#0f0f1a',
                        accent: '#8b5cf6',
                        'accent-light': '#a78bfa',
                        'accent-dark': '#7c3aed',
                        success: '#10b981',
                        danger: '#ef4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0f0f1a;
            background-image: 
                radial-gradient(ellipse at top, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
        }
        
        .reset-card {
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .floating-shapes {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out;
        }
        
        .shape-1 {
            width: 300px;
            height: 300px;
            background: rgba(139, 92, 246, 0.3);
            top: -100px;
            right: -100px;
        }
        
        .shape-2 {
            width: 200px;
            height: 200px;
            background: rgba(59, 130, 246, 0.2);
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }
        
        .password-strength {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="text-gray-300 flex items-center justify-center min-h-screen relative overflow-hidden">

    <!-- Background Effects -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="w-full max-w-md px-4 relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8 reset-card">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-accent to-accent-dark rounded-2xl shadow-lg shadow-accent/30 mb-4">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Reset Password</h1>
            <p class="text-gray-500 mt-2">Enter your new password below</p>
        </div>

        <div class="glass-panel p-8 reset-card" style="animation-delay: 0.1s;">
            <form id="reset-password-form" class="space-y-5">
                <div class="form-group">
                    <label for="password" class="text-sm font-medium text-gray-400 mb-2">New Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required minlength="6"
                            class="w-full px-4 py-3.5 bg-black/30 border border-gray-700 text-white rounded-xl focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/20 transition-all placeholder-gray-600"
                            placeholder="Enter new password">
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                    </div>
                    <div class="mt-2">
                        <div class="password-strength bg-gray-700" id="password-strength-bar"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password" class="text-sm font-medium text-gray-400 mb-2">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirm-password" name="confirm-password" required
                            class="w-full px-4 py-3.5 bg-black/30 border border-gray-700 text-white rounded-xl focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/20 transition-all placeholder-gray-600"
                            placeholder="Confirm new password">
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div id="message-display" class="text-sm text-center min-h-[20px] font-medium"></div>

                <div>
                    <button type="submit" class="btn-primary w-full py-3.5 text-base">
                        <span>Reset Password</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>
                </div>
            </form>

            <div id="login-link" class="mt-8 pt-6 border-t border-gray-800 text-center hidden">
                <a href="login.html" class="text-accent hover:text-accent-light font-semibold transition">
                    Proceed to Sign In →
                </a>
            </div>
        </div>

        <!-- Back to Login -->
        <div class="text-center mt-6">
            <a href="login.html" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-white transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Login
            </a>
        </div>
    </div>

    <script type="module">
        import config from './config.js';

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('message-display').textContent = 'Invalid reset token. Please request a new password reset.';
            document.getElementById('message-display').className = 'text-sm text-center min-h-[20px] text-danger';
            document.querySelector('button[type="submit"]').disabled = true;
        }

        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('password-strength-bar');
        
        // Password strength indicator
        passwordInput.addEventListener('input', (e) => {
            const password = e.target.value;
            let strength = 0;
            
            if (password.length >= 6) strength += 25;
            if (password.length >= 8) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            
            if (strength <= 25) {
                strengthBar.style.width = '25%';
                strengthBar.style.background = '#ef4444';
            } else if (strength <= 50) {
                strengthBar.style.width = '50%';
                strengthBar.style.background = '#f59e0b';
            } else if (strength <= 75) {
                strengthBar.style.width = '75%';
                strengthBar.style.background = '#3b82f6';
            } else {
                strengthBar.style.width = '100%';
                strengthBar.style.background = '#10b981';
            }
        });

        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const messageDisplay = document.getElementById('message-display');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            // Validation
            if (password !== confirmPassword) {
                messageDisplay.textContent = 'Passwords do not match!';
                messageDisplay.className = 'text-sm text-center min-h-[20px] text-danger';
                return;
            }
            
            if (password.length < 6) {
                messageDisplay.textContent = 'Password must be at least 6 characters!';
                messageDisplay.className = 'text-sm text-center min-h-[20px] text-danger';
                return;
            }
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Resetting...';
            
            messageDisplay.textContent = '';
            messageDisplay.className = 'text-sm text-center min-h-[20px]';

            try {
                const response = await fetch(`${config.API_URL}/api/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDisplay.textContent = 'Password reset successful! Redirecting...';
                    messageDisplay.className = 'text-sm text-center min-h-[20px] text-success';
                    document.getElementById('reset-password-form').reset();
                    document.getElementById('login-link').classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    messageDisplay.textContent = data.message || 'Failed to reset password. Please try again.';
                    messageDisplay.className = 'text-sm text-center min-h-[20px] text-danger';
                }
            } catch (err) {
                console.error(err);
                messageDisplay.textContent = 'Connection error. Please check your network.';
                messageDisplay.className = 'text-sm text-center min-h-[20px] text-danger';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Reset Password</span><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>';
            }
        });
    </script>
</body>

</html>
