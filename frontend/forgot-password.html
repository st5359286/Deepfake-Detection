<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Deepfake Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#0f0f1a',
                        accent: '#8b5cf6',
                        'accent-light': '#a78bfa',
                        'accent-dark': '#7c3aed',
                        success: '#10b981',
                        danger: '#ef4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0f0f1a;
            background-image: 
                radial-gradient(ellipse at top, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
        }
        
        .forgot-card {
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .floating-shapes {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out;
        }
        
        .shape-1 {
            width: 300px;
            height: 300px;
            background: rgba(139, 92, 246, 0.3);
            top: -100px;
            right: -100px;
        }
        
        .shape-2 {
            width: 200px;
            height: 200px;
            background: rgba(59, 130, 246, 0.2);
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }
    </style>
</head>

<body class="text-gray-300 flex items-center justify-center min-h-screen relative overflow-hidden">

    <!-- Background Effects -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="w-full max-w-md px-4 relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8 forgot-card">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-accent to-accent-dark rounded-2xl shadow-lg shadow-accent/30 mb-4">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Forgot Password?</h1>
            <p class="text-gray-500 mt-2">Enter your email to reset your password</p>
        </div>

        <div class="glass-panel p-8 forgot-card" style="animation-delay: 0.1s;">
            <form id="forgot-password-form" class="space-y-6">
                <div class="form-group">
                    <label for="email" class="text-sm font-medium text-gray-400 mb-2">Email Address</label>
                    <div class="relative">
                        <input type="email" id="email" name="email" required
                            class="w-full px-4 py-3.5 bg-black/30 border border-gray-700 text-white rounded-xl focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent/20 transition-all placeholder-gray-600"
                            placeholder="Enter your email">
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div id="message-display" class="text-sm text-center min-h-[20px] font-medium"></div>

                <div>
                    <button type="submit" class="btn-primary w-full py-3.5 text-base">
                        <span>Send Reset Link</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-800">
                <p class="text-center text-sm text-gray-500">
                    Remember your password?
                    <a href="login.html" class="text-accent hover:text-accent-light font-semibold transition ml-1">
                        Sign in
                    </a>
                </p>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="index.html" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-white transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Home
            </a>
        </div>
    </div>

    <script type="module">
        import config from './config.js';

        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const messageDisplay = document.getElementById('message-display');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Sending...';
            
            messageDisplay.textContent = '';
            messageDisplay.className = 'text-sm text-center min-h-[20px]';

            try {
                const response = await fetch(`${config.API_URL}/api/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDisplay.textContent = 'Password reset link sent! Check your email.';
                    messageDisplay.className = 'text-sm text-center min-h-[20px] text-success';
                    document.getElementById('forgot-password-form').reset();
                } else {
                    messageDisplay.textContent = data.message || 'Failed to send reset link. Please try again.';
                    messageDisplay.className = 'text-sm text-center min-h-[20px] text-danger';
                }
            } catch (err) {
                console.error(err);
                messageDisplay.textContent = 'Connection error. Please check your network.';
                messageDisplay.className = 'text-sm text-center min-h-[20px] text-danger';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Send Reset Link</span><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>';
            }
        });
    </script>
</body>

</html>
