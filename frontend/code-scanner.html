<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Scanner | Deepfake Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#0f0f1a',
                        accent: '#8b5cf6',
                        'accent-light': '#a78bfa',
                        'accent-dark': '#7c3aed',
                        success: '#10b981',
                        danger: '#ef4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0f0f1a;
            background-image: 
                radial-gradient(ellipse at top, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
        }
        
        .upload-area {
            border: 2px dashed rgba(139, 92, 246, 0.3);
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.05);
        }
        
        .drop-zone {
            border: 2px dashed rgba(139, 92, 246, 0.3);
            transition: all 0.3s ease;
        }
        
        .drop-zone:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.05);
        }

        .issue-critical {
            border-left: 4px solid #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        
        .issue-warning {
            border-left: 4px solid #f59e0b;
            background: rgba(245, 158, 11, 0.1);
        }
        
        .issue-info {
            border-left: 4px solid #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>

<body class="bg-[#0f0f1a] text-gray-300 font-sans min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Background Effects -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-accent/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
    </div>

    <!-- Header -->
    <header class="border-b border-gray-800 bg-black/30 backdrop-blur-md sticky top-0 z-50 relative">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <a href="vastav.html" class="text-gray-400 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </a>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-accent to-accent-dark rounded-lg flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                        </svg>
                    </div>
                    <h1 class="text-lg font-bold text-white">Code Scanner</h1>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-success rounded-full animate-pulse"></span>
                <span class="text-xs text-gray-500">System Active</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 flex flex-col items-center justify-center relative z-10">

        <!-- Upload Area -->
        <div class="w-full max-w-2xl">
            <div class="glass-panel p-8">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-accent/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <h2 class="text-xl font-bold text-white mb-2">Analyze JavaScript Code</h2>
                    <p class="text-sm text-gray-500">Upload a .js file to scan for bugs, errors, and security issues</p>
                </div>

                <!-- File Drop Zone -->
                <div class="upload-area rounded-xl p-8 flex flex-col items-center justify-center cursor-pointer relative" id="drop-zone">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-base text-white font-medium mb-1">Drop JavaScript file here</p>
                    <p class="text-sm text-gray-500 mb-4">or click to browse</p>
                    <span class="btn-primary text-sm">Select File</span>
                    <input type="file" id="qr-input-file" accept=".js" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                </div>

                <!-- Status Messages -->
                <div class="mt-4 text-center">
                    <div id="scan-status" class="text-sm text-accent animate-pulse hidden">Analyzing code...</div>
                    <div id="file-error" class="text-sm text-danger mt-2 hidden"></div>
                </div>
            </div>

            <!-- Results Panel -->
            <div id="result-panel" class="mt-8 hidden animate-fade-in">
                <div class="glass-panel p-6 border border-gray-800 rounded-2xl">
                    <!-- Summary -->
                    <div id="result-summary" class="mb-6">
                        <!-- Summary will be populated by JavaScript -->
                    </div>

                    <!-- Issues List -->
                    <div id="issues-list" class="space-y-4">
                        <!-- Issues will be populated by JavaScript -->
                    </div>

                    <!-- Actions -->
                    <div class="mt-6 flex justify-between items-center pt-4 border-t border-gray-800">
                        <button id="copy-btn" class="text-sm bg-black/40 hover:bg-black/60 text-white px-4 py-2 rounded-lg transition">
                            Copy Report
                        </button>
                        <button id="reset-scanner-btn" class="text-sm btn-primary">
                            Scan Another File
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 bg-black/30 py-4 mt-auto relative z-10">
        <div class="container mx-auto px-4 text-center text-xs text-gray-600">
            Deepfake Detector | Code Analysis Module
        </div>
    </footer>

    <script src="code-scanner.js"></script>
</body>

</html>
