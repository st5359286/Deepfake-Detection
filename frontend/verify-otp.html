<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | Deepfake Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#0f0f1a',
                        accent: '#8b5cf6',
                        'accent-light': '#a78bfa',
                        'accent-dark': '#7c3aed',
                        success: '#10b981',
                        danger: '#ef4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0f0f1a;
            background-image: 
                radial-gradient(ellipse at top, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
        }
        
        .otp-card {
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .otp-input {
            transition: all 0.3s ease;
        }
        
        .otp-input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            transform: scale(1.02);
        }
        
        .floating-shapes {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out;
        }
        
        .shape-1 {
            width: 300px;
            height: 300px;
            background: rgba(139, 92, 246, 0.3);
            top: -100px;
            right: -100px;
        }
        
        .shape-2 {
            width: 200px;
            height: 200px;
            background: rgba(59, 130, 246, 0.2);
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }
        
        .pulse-ring {
            animation: pulse-ring 2s infinite;
        }
        
        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(139, 92, 246, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(139, 92, 246, 0);
            }
        }
    </style>
</head>

<body class="text-gray-300 flex items-center justify-center min-h-screen relative overflow-hidden">

    <!-- Background Effects -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="w-full max-w-md px-4 relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8 otp-card">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-accent to-accent-dark rounded-2xl shadow-lg shadow-accent/30 mb-4 pulse-ring">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Two-Factor Authentication</h1>
            <p class="text-gray-500 mt-2">Enter the verification code sent to your email</p>
        </div>

        <div class="glass-panel p-8 otp-card" style="animation-delay: 0.1s;">
            <form id="otp-form" class="space-y-6">
                <div class="form-group">
                    <label for="otp" class="text-sm font-medium text-gray-400 mb-4 block text-center">Verification Code</label>
                    <div class="relative">
                        <input type="text" id="otp" name="otp" required maxlength="6"
                            class="otp-input w-full px-4 py-4 bg-black/30 border border-gray-700 text-white text-center text-2xl tracking-[0.5em] rounded-xl focus:border-accent focus:outline-none transition-all placeholder-gray-600 font-mono"
                            placeholder="000000" autocomplete="one-time-code">
                    </div>
                </div>

                <div id="error-message" class="text-danger text-sm text-center min-h-[20px] font-medium"></div>

                <div>
                    <button type="submit" class="btn-primary w-full py-3.5 text-base">
                        <span>Verify</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-800">
                <p class="text-center text-sm text-gray-500">
                    Didn't receive the code?
                    <a href="#" id="resend-link" class="text-accent hover:text-accent-light font-semibold transition ml-1">
                        Resend
                    </a>
                </p>
            </div>
        </div>

        <!-- Back to Login -->
        <div class="text-center mt-6">
            <a href="login.html" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-white transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Login
            </a>
        </div>
    </div>

    <script type="module">
        import config from './config.js';

        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');

        if (!email) {
            window.location.href = 'login.html';
        }

        // Auto-focus OTP input
        document.getElementById('otp').focus();

        // Format OTP input - only allow numbers
        document.getElementById('otp').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
        });

        // Auto-submit when 6 digits entered
        document.getElementById('otp').addEventListener('keyup', (e) => {
            if (e.target.value.length === 6) {
                document.getElementById('otp-form').dispatchEvent(new Event('submit'));
            }
        });

        document.getElementById('otp-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            const errorMsg = document.getElementById('error-message');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            if (otp.length !== 6) {
                errorMsg.textContent = 'Please enter a valid 6-digit code';
                errorMsg.className = 'text-sm text-center min-h-[20px] text-danger';
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Verifying...';

            errorMsg.textContent = '';
            errorMsg.className = 'text-sm text-center min-h-[20px]';

            try {
                const response = await fetch(`${config.API_URL}/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const data = await response.json();

                if (response.ok) {
                    errorMsg.textContent = 'Verification successful! Redirecting...';
                    errorMsg.className = 'text-sm text-center min-h-[20px] text-success';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    errorMsg.textContent = data.message || 'Verification failed. Please try again.';
                    errorMsg.className = 'text-sm text-center min-h-[20px] text-danger';
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'Connection error. Please check your network.';
                errorMsg.className = 'text-sm text-center min-h-[20px] text-danger';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Verify</span><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
            }
        });

        // Handle Resend Link Click
        document.getElementById('resend-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('error-message');
            const resendLink = document.getElementById('resend-link');

            resendLink.textContent = 'Sending...';
            resendLink.classList.add('text-gray-500');
            resendLink.classList.remove('text-accent');

            try {
                const response = await fetch(`${config.API_URL}/resend-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    errorMsg.textContent = 'Code sent successfully! Check your email.';
                    errorMsg.className = 'text-sm text-center min-h-[20px] text-success';
                } else {
                    errorMsg.textContent = data.message || 'Failed to resend code.';
                    errorMsg.className = 'text-sm text-center min-h-[20px] text-danger';
                }
            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.className = 'text-sm text-center min-h-[20px] text-danger';
            } finally {
                resendLink.textContent = 'Resend';
                resendLink.classList.remove('text-gray-500');
                resendLink.classList.add('text-accent');
            }
        });
    </script>
</body>

</html>
